<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cosmic Dust</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.143.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.143.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="scene"></canvas>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { GammaCorrectionShader } from 'three/addons/shaders/GammaCorrectionShader.js';
import { CopyShader } from 'three/addons/shaders/CopyShader.js';

// ── Helpers ─────────────────────────────────────────────────────────────
function hexToVec3(hex) {
  const n = parseInt(hex.slice(1), 16);
  return new THREE.Vector3(
    ((n >> 16) & 255) / 255,
    ((n >> 8) & 255) / 255,
    (n & 255) / 255
  );
}

// ── Fixed Parameters ────────────────────────────────────────────────────
const BG_COLOR      = '#1a0a04';
const FLAME_A       = '#ff7a2a';
const FLAME_B       = '#ffce5a';
const FLAME_AMT     = 0.2;
const DUST_COOL     = '#b3401f';
const DUST_WARM     = '#ffc46b';
const DUST_ALPHA    = 0.68;
const POINT_COUNT   = 940;
const FIELD_DEPTH   = 3.7;
const DRIFT_SPEED   = 0.4;
const FADE_IN_MS    = 2200;

// ── Layers ──────────────────────────────────────────────────────────────
const LAYERS = { NONE: 0, TORUS_SCENE: 1, BLOOM_SCENE: 2, ENTIRE_SCENE: 3 };

// ── Renderer ────────────────────────────────────────────────────────────
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGL1Renderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.VSMShadowMap;

// ── Scene ───────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.Fog(0x000000, 0, 22);

// ── Camera ──────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 80);
camera.position.set(0, 0, 3);
camera.layers.enable(LAYERS.TORUS_SCENE);
camera.layers.enable(LAYERS.BLOOM_SCENE);
camera.layers.enable(LAYERS.ENTIRE_SCENE);
scene.add(camera);

// ── Dust Geometry ───────────────────────────────────────────────────────
const count = POINT_COUNT;
const positions = [], sizes = [];
for (let i = 0; i < count; i++) {
  positions.push(2 * Math.random() - 1, 2 * Math.random() - 1, 2 * Math.random() - 1);
  sizes.push(25 + 25 * Math.random());
}
const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

// ── Dust Shader Material ────────────────────────────────────────────────
const uniforms = {
  iTime:       { value: 0 },
  iShift:      { value: new THREE.Vector3() },
  iAlpha:      { value: 0 },
  iAnimation:  { value: new THREE.Vector3(0, 0, 0) },
  iResolution: { value: { x: innerWidth * devicePixelRatio, y: innerHeight * devicePixelRatio } },
  uDepth:      { value: FIELD_DEPTH },
  uCool:       { value: hexToVec3(DUST_COOL) },
  uWarm:       { value: hexToVec3(DUST_WARM) }
};

const material = new THREE.ShaderMaterial({
  transparent: true,
  uniforms,
  vertexShader: `
    attribute float size;
    uniform float iTime;
    uniform vec3 iShift;
    uniform vec2 iResolution;
    uniform vec3 iAnimation;
    uniform float uDepth;
    varying float transparency;
    varying float warmness;
    vec3 warp3d(vec3 pos, float t) {
      float curv = 0.9, a = 1.9, b = 0.25, b2 = 0.03, c = 0.02;
      pos *= 2.;
      pos.x += curv * sin(c * t + a * pos.y) + t * b2;
      pos.y += curv * cos(c * t + a * pos.x);
      pos.z += curv * cos(c * t + a * pos.y);
      pos.z += curv * sin(c * t + a * pos.x) + t * b;
      pos.z = abs(pos.z);
      return pos.xyz;
    }
    void main() {
      vec3 v = warp3d(position, iTime);
      v = uDepth * (2. * fract(v + iShift) - 1.) + iAnimation;
      vec4 vpos = modelViewMatrix * vec4(v, 1.);
      transparency = step(length(v), uDepth);
      warmness = step(.75, fract(size * 7.13));
      gl_PointSize = size * iResolution.y / 1000. / -vpos.z;
      gl_Position = projectionMatrix * vpos;
    }
  `,
  fragmentShader: `
    varying float transparency;
    varying float warmness;
    uniform float iAlpha;
    uniform vec3 uCool;
    uniform vec3 uWarm;
    void main() {
      vec3 color = mix(uCool * .8, uWarm * .8, warmness);
      float tex = smoothstep(1., .3, length(2. * gl_PointCoord - 1.));
      gl_FragColor = vec4(tex * color, tex * transparency * iAlpha);
    }
  `
});
material.stencil = false;

const points = new THREE.Points(geometry, material);
points.position.set(0, 0, -1);
points.layers.enable(LAYERS.ENTIRE_SCENE);
scene.add(points);

// ── FinalPass Composite Shader ──────────────────────────────────────────
const FinalPass = {
  uniforms: {
    iTime:        { value: 0 },
    tDiffuse:     { value: null },
    torusTexture: { value: null },
    bloomTexture: { value: null },
    haloTexture:  { value: null },
    uBg:          { value: hexToVec3(BG_COLOR) },
    uFlameA:      { value: hexToVec3(FLAME_A) },
    uFlameB:      { value: hexToVec3(FLAME_B) },
    uFlameAmt:    { value: FLAME_AMT }
  },
  vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }`,
  fragmentShader: `
    uniform float iTime;
    uniform sampler2D tDiffuse;
    uniform sampler2D bloomTexture;
    uniform sampler2D torusTexture;
    uniform sampler2D haloTexture;
    uniform vec3 uBg;
    uniform vec3 uFlameA;
    uniform vec3 uFlameB;
    uniform float uFlameAmt;
    varying vec2 vUv;
    vec3 warp3d(vec3 pos, float t){
      float curv=.8,a=1.9,b=0.7;
      pos*=2.;
      pos.x+=curv*sin(t+a*pos.y)+t*b;
      pos.y+=curv*cos(t+a*pos.x);
      pos.y+=curv*sin(t+a*pos.z)+t*b;
      pos.z+=curv*cos(t+a*pos.y);
      pos.z+=curv*sin(t+a*pos.x)+t*b;
      pos.x+=curv*cos(t+a*pos.z);
      return 0.5+0.5*cos(pos.xyz+vec3(1,2,4));
    }
    void main(){
      vec2 uv = 2.*vUv - 1.;
      vec3 w = pow(warp3d(vec3(uv.x, sin(uv.y), uv.y), iTime*1.5), vec3(1.5));
      vec3 flame = 1.5*uFlameA*w.x;
      flame*=w.y;
      flame += uFlameB*w.z;
      flame *= smoothstep(0.25, 1., abs(uv.y));
      float md = smoothstep(-0.7, 1., -uv.y*uv.x);
      flame *= md*md;
      vec3 bg = uBg * (1.0 - 0.4 * length(uv));
      vec3 halo = texture2D(haloTexture, vUv).xyz;
      gl_FragColor = vec4(bg + flame*uFlameAmt + texture2D(bloomTexture, vUv).xyz + texture2D(torusTexture, vUv).xyz + texture2D(tDiffuse, vUv).xyz + halo, 1.);
    }
  `
};

// ── Postprocessing ──────────────────────────────────────────────────────
const renderPass = new RenderPass(scene, camera);

// Torus Composer
const torusComposer = new EffectComposer(renderer);
torusComposer.renderToScreen = false;
torusComposer.addPass(renderPass);
torusComposer.addPass(new ShaderPass(GammaCorrectionShader));
torusComposer.addPass(new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.3, 0.3, 0
));
torusComposer.addPass(new ShaderPass(CopyShader));

// Bloom Composer
const bloomComposer = new EffectComposer(renderer);
bloomComposer.renderToScreen = false;
bloomComposer.addPass(renderPass);
bloomComposer.addPass(new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.5, 0.7, 0
));
bloomComposer.addPass(new ShaderPass(GammaCorrectionShader));

// Final Composer
const finalComposer = new EffectComposer(renderer);
finalComposer.addPass(renderPass);
const finalPass = new ShaderPass(FinalPass);
finalPass.uniforms.bloomTexture.value = bloomComposer.renderTarget1.texture;
finalPass.uniforms.torusTexture.value = torusComposer.renderTarget1.texture;
finalComposer.addPass(finalPass);

// ── Fly Points Update ───────────────────────────────────────────────────
const flyPoints = {
  render() {
    uniforms.iTime.value = performance.now() / 1000;
    uniforms.iShift.value.add(
      camera.position.clone().multiplyScalar(0.0022 * DRIFT_SPEED)
    );
  }
};

// ── Resize ──────────────────────────────────────────────────────────────
function onResize() {
  const w = innerWidth;
  const h = innerHeight;
  const dpr = devicePixelRatio;

  renderer.setPixelRatio(dpr);
  renderer.setSize(w, h, false);

  camera.aspect = w / h;
  camera.updateProjectionMatrix();

  torusComposer.setPixelRatio(dpr);
  torusComposer.setSize(w, h);

  bloomComposer.setPixelRatio(dpr);
  bloomComposer.setSize(w, h);

  finalComposer.setPixelRatio(dpr);
  finalComposer.setSize(w, h);

  uniforms.iResolution.value = {
    x: innerWidth * devicePixelRatio,
    y: innerHeight * devicePixelRatio
  };
}
window.addEventListener('resize', onResize);
onResize();

// ── Fade-In Animation ───────────────────────────────────────────────────
const fadeStart = performance.now();
function appearIn() {
  const elapsed = performance.now() - fadeStart;
  let t = Math.min(elapsed / FADE_IN_MS, 1);
  const eased = t * t * t * (t * (t * 6 - 15) + 10);
  uniforms.iAlpha.value = eased * DUST_ALPHA;
  if (t < 1) requestAnimationFrame(appearIn);
}
requestAnimationFrame(appearIn);

// ── Render Loop ─────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  finalPass.uniforms.iTime.value = performance.now() / 1000;
  flyPoints.render();

  camera.layers.set(LAYERS.TORUS_SCENE);
  torusComposer.render();

  camera.layers.set(LAYERS.BLOOM_SCENE);
  bloomComposer.render();

  camera.layers.set(LAYERS.ENTIRE_SCENE);
  finalComposer.render();
}
animate();
</script>
</body>
</html>
